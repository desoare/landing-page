<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal website.">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <title>hi there!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,400&family=DM+Sans:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
 
    :root {
      --bg: #0f1117;
      --ink: #e8e4dc;
      --muted: #5a5a6a;
      --accent: #5b9fd9;
      --toggle-bg: rgba(255,255,255,0.07);
      --toggle-hover: rgba(255,255,255,0.13);
    }
 
    [data-theme="light"] {
      --bg: #f7f5f0;
      --ink: #1a1a18;
      --muted: #9a9890;
      --accent: #1048B7;
      --toggle-bg: rgba(0,0,0,0.05);
      --toggle-hover: rgba(0,0,0,0.1);
    }
 
    html, body {
      height: 100%;
    }
 
    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      transition: background-color 0.4s ease, color 0.4s ease;
    }
 
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }
 
    /* Theme toggle */
    .toggle {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      z-index: 10;
      background: var(--toggle-bg);
      border: none;
      border-radius: 999px;
      padding: 0.45rem 0.85rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      transition: background 0.3s ease, color 0.3s ease;
      opacity: 0;
      animation: fadein 1s ease 2.5s forwards;
    }
 
    .toggle:hover {
      background: var(--toggle-hover);
    }
 
    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      padding: 2rem;
      text-align: center;
      gap: 1.5rem;
    }
 
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(80px, 14vw, 200px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--ink);
      opacity: 0;
      transform: translateY(-28px);
      filter: blur(6px);
      animation: place 1.4s cubic-bezier(0.22, 1, 0.36, 1) 1s forwards;
      transition: color 0.4s ease;
    }
 
    .tagline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: clamp(19px, 2.5vw, 29px);
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--accent);
      opacity: 0;
      transform: translateY(-14px);
      filter: blur(4px);
      animation: place 1.2s cubic-bezier(0.22, 1, 0.36, 1) 1.5s forwards, electron-cloud 7s ease-in-out 2.7s infinite;
      transition: color 0.4s ease;
    }
 
    footer {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 1.75rem 2rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      opacity: 0;
      animation: fadein 1s ease 2.2s forwards;
    }
 
    .domain {
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: var(--ink);
      transition: color 0.4s ease;
    }
 
    .year {
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--muted);
      transition: color 0.4s ease;
    }
 
    .email {
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-decoration: none;
      transition: color 0.4s ease;
    }
 
    .email:hover {
      color: var(--ink);
    }
 
 
 
    @keyframes electron-cloud {
      0%   { transform: translate(0, 0);           filter: blur(0px);   }
      5%   { transform: translate(1.5px, -1px);    filter: blur(2.5px); }
      11%  { transform: translate(-1px, 1.5px);    filter: blur(0.3px); }
      17%  { transform: translate(2px, 1px);       filter: blur(3.5px); }
      22%  { transform: translate(-1.5px, -2px);   filter: blur(1px);   }
      28%  { transform: translate(0.5px, 2px);     filter: blur(3.8px); }
      33%  { transform: translate(-2px, -0.5px);   filter: blur(0.5px); }
      39%  { transform: translate(1px, -1.5px);    filter: blur(2.8px); }
      44%  { transform: translate(-0.5px, 1px);    filter: blur(4px);   }
      50%  { transform: translate(2px, -1px);      filter: blur(0.8px); }
      55%  { transform: translate(-1px, 2px);      filter: blur(3.2px); }
      61%  { transform: translate(1.5px, 0.5px);   filter: blur(1.5px); }
      67%  { transform: translate(-2px, -1.5px);   filter: blur(3.8px); }
      72%  { transform: translate(0.5px, -0.5px);  filter: blur(0.2px); }
      78%  { transform: translate(-1.5px, 1px);    filter: blur(2.5px); }
      83%  { transform: translate(2px, -2px);      filter: blur(4px);   }
      89%  { transform: translate(-1px, 0.5px);    filter: blur(1.2px); }
      94%  { transform: translate(1px, 1.5px);     filter: blur(3px);   }
      100% { transform: translate(0, 0);           filter: blur(0px);   }
    }
 
    @keyframes place {
      0%   { opacity: 0; transform: translateY(-28px); filter: blur(6px); }
      60%  { opacity: 1; filter: blur(0px); }
      80%  { transform: translateY(4px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0px); }
    }
 
    @keyframes fadein {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <button class="toggle" id="toggle" aria-label="Toggle theme">☀ light</button>
 
  <main>
    <h1>hi there!</h1>
    <p class="tagline">every electron counts.</p>
  </main>
 
  <footer>
    <span class="domain" id="domain"></span>
    <span class="year" id="year"></span>
    <a class="email" id="email" href=""></a>
  </footer>
 
  <script>
    const html = document.documentElement;
    const btn = document.getElementById('toggle');
 
    btn.addEventListener('click', () => {
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      btn.textContent = isDark ? '☾ dark' : '☀ light';
    });
 
    const hostname = window.location.hostname || 'yourdomain.com';
    const email = 'hi@' + hostname;
    document.getElementById('domain').textContent = hostname;
    document.getElementById('year').textContent = new Date().getFullYear();
    document.getElementById('email').textContent = email;
    document.getElementById('email').href = 'mailto:' + email;
  </script>
</body>
</html>
