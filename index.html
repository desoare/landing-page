<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal website.">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <title>hi there!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,400&family=DM+Sans:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f7f5f0;
      --ink: #1a1a18;
      --muted: #9a9890;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      padding: 2rem;
      text-align: center;
      gap: 1.5rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(80px, 14vw, 200px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--ink);
      opacity: 0;
      transform: translateY(-28px);
      filter: blur(6px);
      animation: place 1.4s cubic-bezier(0.22, 1, 0.36, 1) 1s forwards;
    }

    .tagline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: clamp(18px, 2.5vw, 28px);
      font-weight: 400;
      letter-spacing: 0.01em;
      opacity: 0;
      transform: translateY(-14px);
      filter: blur(4px);
      animation: place 1.2s cubic-bezier(0.22, 1, 0.36, 1) 1.5s forwards;
    }

    footer {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 1.75rem 2rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      opacity: 0;
      animation: fadein 1s ease 2.2s forwards;
    }

    .domain {
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: var(--ink);
    }

    .year {
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .email {
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-decoration: none;
    }

    .email:hover {
      color: var(--ink);
    }

    @keyframes place {
      0%   { opacity: 0; transform: translateY(-28px); filter: blur(6px); }
      60%  { opacity: 1; filter: blur(0px); }
      80%  { transform: translateY(4px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0px); }
    }

    @keyframes fadein {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <main>
    <h1>hi there!</h1>
    <p class="tagline" id="tagline">every electron counts.</p>
  </main>

  <footer>
    <span class="domain" id="domain"></span>
    <span class="year" id="year"></span>
    <a class="email" id="email" href=""></a>
  </footer>

  <script>
    // All colors are dark enough to be legible on #f7f5f0
    const accents = [
      '#6b4e2a', // warm brown
      '#2a5c45', // forest green
      '#3a4e7a', // slate blue
      '#7a3a4e', // dusty rose
      '#4a3a7a', // muted violet
      '#5c4a1a', // aged gold
      '#2a5a5a', // dark teal
      '#6b3a2a', // terracotta
      '#3a5c3a', // deep sage
      '#5a3a6b', // plum
    ];

    const color = accents[Math.floor(Math.random() * accents.length)];
    document.getElementById('tagline').style.color = color;

    const hostname = window.location.hostname || 'yourdomain.com';
    const email = 'hi@' + hostname;
    document.getElementById('domain').textContent = hostname;
    document.getElementById('year').textContent = new Date().getFullYear();
    document.getElementById('email').textContent = email;
    document.getElementById('email').href = 'mailto:' + email;
  </script>
</body>
</html>
